# Compose RIENG cho dashboard DERP (derp-backend) — deploy DOC LAP khoi deployHeadscale.
# derp-backend chay duoi project nay, roi duoc 'docker network connect' vao mang cua
# headscale (workflow tu detect) -> Caddy route /app + headscale derp.urls van goi
# duoc 'derp-backend:8787'. DB la Neon (cloud) nen KHONG can volume.
#
# .env (workflow tu ghi tu secrets): DERP_DATABASE_URL, DERP_SESSION_SECRET,
# DERP_ALLOWED_EMAILS, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET.
services:
  derp-backend:
    image: ghcr.io/vanbienperu3107/derp-backend:latest
    container_name: derp-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DERP_DATABASE_URL:-}
      - PORT=8787
      - PUBLIC_URL=https://vpn2.hangocthanh.io.vn/app
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - SESSION_SECRET=${DERP_SESSION_SECRET:-}
      - ALLOWED_EMAILS=${DERP_ALLOWED_EMAILS:-hangocthanh3107@gmail.com,hangocthanhperu3107@gmail.com}
      - AUTH_OPTIONAL=false
      - NODE_ENV=production
