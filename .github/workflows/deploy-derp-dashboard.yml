name: Deploy DERP dashboard

# Deploy DOC LAP dashboard DERP (derp-backend) len vpn2 — TU CHUA trong repo nay,
# KHONG dung main, KHONG dung compose cua deployHeadscale.
#
# CACH DUNG: push 1 git TAG dang 'deploy-dashboard-*' (tren bat ky nhanh nao):
#   git tag deploy-dashboard-2 && git push origin deploy-dashboard-2
# -> build image tu commit do -> SSH vpn2 -> docker run derp-backend tren mang headscale.
#
# CAN secrets trong repo nay:
#   SSH_HOST, SSH_USER, SSH_KEY, SSH_PORT (tuy chon)
#   DERP_DATABASE_URL, DERP_SESSION_SECRET, DERP_ALLOWED_EMAILS,
#   GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
#   DERP_PUBLIC_URL   — URL công khai backend (vd: https://vpn2.hangocthanh.io.vn/app)
#                       dùng cho PUBLIC_URL env và webhook auto-seed key.
#   HEADSCALE_API_KEY — (tuỳ chọn) key bootstrap lần đầu nếu muốn seed qua env var
on:
  push:
    tags:
      - 'deploy-dashboard-*'

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-derp-dashboard
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build branch + deploy derp-backend (self-contained)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout commit được tag
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image (từ commit này)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/derp-backend:latest
            ghcr.io/${{ github.repository_owner }}/derp-backend:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy derp-backend lên vpn2 (docker run, mạng headscale)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: DERP_DATABASE_URL,DERP_SESSION_SECRET,DERP_ALLOWED_EMAILS,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,DERP_PUBLIC_URL,HEADSCALE_API_KEY,GH_PAT
          script_stop: true
          command_timeout: 10m
          script: |
            set -e
            if [ "$(id -u)" -ne 0 ]; then SUDO="sudo"; else SUDO=""; fi
            IMG="ghcr.io/vanbienperu3107/derp-backend:latest"

            # PUBLIC_URL từ secret — backend ở đâu cũng được, không hardcode
            BACKEND_URL="${DERP_PUBLIC_URL:-https://vpn2.hangocthanh.io.vn/app}"

            echo "==> Detect mang cua headscale"
            HSNET=$($SUDO docker inspect headscale -f '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' 2>/dev/null | awk '{print $1}')
            echo "  headscale network: ${HSNET:-<khong thay>}"
            NETARG=""
            [ -n "$HSNET" ] && NETARG="--network $HSNET"

            echo "==> Pull image moi"
            $SUDO docker pull "$IMG"

            echo "==> Xoa derp-backend cu roi chay ban moi"
            $SUDO docker rm -f derp-backend >/dev/null 2>&1 || true
            $SUDO docker run -d --name derp-backend --restart unless-stopped $NETARG \
              -e DATABASE_URL="$DERP_DATABASE_URL" \
              -e PORT=8787 \
              -e PUBLIC_URL="$BACKEND_URL" \
              -e GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
              -e GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET" \
              -e SESSION_SECRET="$DERP_SESSION_SECRET" \
              -e ALLOWED_EMAILS="$DERP_ALLOWED_EMAILS" \
              -e HEADSCALE_API_KEY="$HEADSCALE_API_KEY" \
              -e GITHUB_TOKEN="$GH_PAT" \
              -e AUTH_OPTIONAL=false \
              -e NODE_ENV=production \
              "$IMG"

            if [ -z "$HSNET" ]; then
              echo "  CANH BAO: khong detect duoc mang headscale -> Caddy co the khong goi duoc derp-backend."
            fi

            echo "==> Trang thai + health"
            $SUDO docker ps --filter name=derp-backend --format '  {{.Names}} {{.Status}} net={{.Networks}}'
            sleep 4
            $SUDO docker exec derp-backend wget -qO- http://127.0.0.1:8787/healthz || echo "  healthz chua san sang (xem: docker logs derp-backend)"
        env:
          DERP_DATABASE_URL: ${{ secrets.DERP_DATABASE_URL }}
          DERP_SESSION_SECRET: ${{ secrets.DERP_SESSION_SECRET }}
          DERP_ALLOWED_EMAILS: ${{ secrets.DERP_ALLOWED_EMAILS }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DERP_PUBLIC_URL: ${{ secrets.DERP_PUBLIC_URL }}
          HEADSCALE_API_KEY: ${{ secrets.HEADSCALE_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Auto-seed Headscale API key (non-fatal)
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: DERP_SESSION_SECRET,DERP_PUBLIC_URL
          script_stop: false
          command_timeout: 2m
          script: |
            SUDO=""; [ "$(id -u)" -ne 0 ] && SUDO=sudo
            BACKEND_URL="${DERP_PUBLIC_URL:-https://vpn2.hangocthanh.io.vn/app}"

            echo "==> Check headscale container status"
            HS_STATUS="$($SUDO docker inspect headscale --format '{{.State.Status}}' 2>/dev/null || echo 'missing')"
            echo "  headscale status: $HS_STATUS"
            if [ "$HS_STATUS" != "running" ]; then
              echo "  headscale not running, attempting docker start..."
              $SUDO docker start headscale && sleep 5 || echo "  docker start failed (will try anyway)"
              HS_STATUS="$($SUDO docker inspect headscale --format '{{.State.Status}}' 2>/dev/null || echo 'missing')"
              echo "  headscale status after start: $HS_STATUS"
            fi

            echo "==> Creating headscale API key"
            KEY="$($SUDO docker exec headscale headscale apikeys create --expiration 8760h 2>&1 | tail -1 | tr -d '[:space:]')"
            echo "==> KEY_LEN=${#KEY} KEY_PREFIX=${KEY%%.*}"
            if [ -z "$KEY" ] || [ "${KEY%%.*}" = "$KEY" ]; then
              echo "==> No valid key (no dot found) — skipping webhook"
              exit 0
            fi
            echo "==> POSTing key to backend webhook"
            curl -fsSL \
              -X POST "${BACKEND_URL}/api/settings/apikey/webhook" \
              -H "Content-Type: application/json" \
              -H "X-Webhook-Secret: ${DERP_SESSION_SECRET}" \
              -d "{\"key\":\"$KEY\"}" \
              --max-time 15 \
              && echo "==> Webhook OK" || echo "==> Webhook failed"
        env:
          DERP_SESSION_SECRET: ${{ secrets.DERP_SESSION_SECRET }}
          DERP_PUBLIC_URL: ${{ secrets.DERP_PUBLIC_URL }}
