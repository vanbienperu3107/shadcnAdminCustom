name: Deploy DERP dashboard

# Deploy DOC LAP dashboard DERP (derp-backend) len vpn2 — TU CHUA trong repo nay,
# KHONG dung main, KHONG dung compose cua deployHeadscale.
#
# CACH DUNG: push 1 git TAG dang 'deploy-dashboard-*' (tren bat ky nhanh nao):
#   git tag deploy-dashboard-1 && git push origin deploy-dashboard-1
# -> build image tu commit do -> copy deploy/docker-compose.yml + .env len vpn2 ->
#    chay rieng derp-backend roi connect vao mang headscale (Caddy /app + derp.urls van goi duoc).
#
# CAN secrets trong repo nay:
#   SSH_HOST, SSH_USER, SSH_KEY, SSH_PORT (tuy chon)
#   DERP_DATABASE_URL, DERP_SESSION_SECRET, DERP_ALLOWED_EMAILS,
#   GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
on:
  push:
    tags:
      - 'deploy-dashboard-*'

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-derp-dashboard
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build branch + deploy derp-backend (self-contained)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout commit được tag
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image (từ commit này)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/derp-backend:latest
            ghcr.io/${{ github.repository_owner }}/derp-backend:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy compose lên vpn2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: deploy/docker-compose.yml
          target: derp-dashboard
          strip_components: 1

      - name: Deploy derp-backend lên vpn2 (độc lập, connect mạng headscale)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: DERP_DATABASE_URL,DERP_SESSION_SECRET,DERP_ALLOWED_EMAILS,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET
          script_stop: true
          command_timeout: 10m
          script: |
            set -e
            if [ "$(id -u)" -ne 0 ]; then SUDO="sudo"; else SUDO=""; fi
            cd "$HOME/derp-dashboard"

            echo "==> Ghi .env (secrets, KHONG in ra log)"
            umask 077
            : > .env
            printf 'DERP_DATABASE_URL=%s\n'   "$DERP_DATABASE_URL"   >> .env
            printf 'DERP_SESSION_SECRET=%s\n'  "$DERP_SESSION_SECRET"  >> .env
            printf 'DERP_ALLOWED_EMAILS=%s\n'  "$DERP_ALLOWED_EMAILS"  >> .env
            printf 'GOOGLE_CLIENT_ID=%s\n'     "$GOOGLE_CLIENT_ID"     >> .env
            printf 'GOOGLE_CLIENT_SECRET=%s\n' "$GOOGLE_CLIENT_SECRET" >> .env

            echo "==> Detect mang cua headscale"
            HSNET=$($SUDO docker inspect headscale -f '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' 2>/dev/null | awk '{print $1}')
            echo "  headscale network: ${HSNET:-<khong thay>}"

            echo "==> Xoa derp-backend cu (neu deployHeadscale dang giu) roi dung ban moi"
            $SUDO docker rm -f derp-backend >/dev/null 2>&1 || true
            $SUDO docker compose pull
            $SUDO docker compose up -d

            if [ -n "$HSNET" ]; then
              echo "==> Connect derp-backend vao mang headscale ($HSNET)"
              $SUDO docker network connect "$HSNET" derp-backend 2>/dev/null || true
            else
              echo "  CANH BAO: khong detect duoc mang headscale. Kiem tra 'docker network ls' + connect tay."
            fi

            echo "==> Trang thai + health"
            $SUDO docker compose ps
            sleep 4
            $SUDO docker exec derp-backend wget -qO- http://127.0.0.1:8787/healthz || echo "  healthz chua san sang (xem docker logs derp-backend)"
