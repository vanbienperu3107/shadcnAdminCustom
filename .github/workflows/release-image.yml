name: Build & Push DERP image

# Build image gộp (SPA + backend Fastify) và đẩy lên GHCR.
# GATE: CHỈ chạy SAU KHI workflow "Continuous Integration" (lint + format + test FE/BE
# + build) PASS trên nhánh main -> "test GitHub trước khi deploy". Có thể bấm tay.
# Deploy thực tế do repo deployHeadscale (docker compose pull) thực hiện sau đó.
on:
  workflow_run:
    workflows: ['Continuous Integration']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    # Chỉ build khi CI success (hoặc khi bấm chạy tay).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/derp-backend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
